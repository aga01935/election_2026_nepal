<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal 2026 General Election - Live Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Theme Variables */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            
            /* Party Colors */
            --color-rsp: #00BFFF;
            --color-uml: #FF0000;
            --color-nc: #008000;
            --color-ujyaalo: #FFD700;
            --color-other: #808080;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .tracker-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .timestamp {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Pulsing dot for "Live" effect */
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff4757;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .controls {
            margin-bottom: 25px;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background-color: #2a2a2a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--color-rsp);
        }

        .results-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .candidate-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .candidate-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .name-party {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .symbol {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
        }

        /* Emphasis on RSP Bell */
        .symbol.rsp-bell {
            font-size: 1.6rem;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { 
                text-shadow: 0 0 5px rgba(0, 191, 255, 0.4); 
                transform: rotate(-10deg) scale(1); 
            }
            to { 
                text-shadow: 0 0 15px rgba(0, 191, 255, 0.9); 
                transform: rotate(10deg) scale(1.15); 
            }
        }

        .votes {
            font-weight: 400;
            color: var(--text-main);
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .bar-container {
            width: 100%;
            height: 10px;
            background-color: #2a2a2a;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 5px;
            width: 0%; /* Set via JS */
            transition: width 1s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

    </style>
</head>
<body>

    <div class="tracker-container">
        <header>
            <h1>Nepal 2026 General Election</h1>
            <div class="timestamp">
                <span class="live-dot"></span>
                Last Updated: March 6, 2026 - 12:30 PM
            </div>
        </header>

        <div class="controls">
            <select id="region-select">
                <option value="Jhapa-5">Jhapa-5</option>
                <option value="Makwanpur-2">Makwanpur-2</option>
                <option value="Kathmandu-3">Kathmandu-3</option>
            </select>
        </div>

        <div id="results-display" class="results-wrapper">
            </div>
    </div>

    <script>
        // 1. Data Dictionary
        const electionData = {
            "Jhapa-5": [
                {"candidate": "Balendra Shah", "party": "RSP", "votes": 15169, "symbol": "🔔"},
                {"candidate": "KP Sharma Oli", "party": "CPN-UML", "votes": 3344, "symbol": "☀️"},
                {"candidate": "Samir Tamang", "party": "Shram Sanskriti", "votes": 1357, "symbol": "🛠️"}
            ],
            "Makwanpur-2": [
                {"candidate": "Prashant Upreti", "party": "RSP", "votes": 4746, "symbol": "🔔"},
                {"candidate": "Buddha Lama", "party": "NC", "votes": 2309, "symbol": "🌳"},
                {"candidate": "Mahesh Bartaula", "party": "CPN-UML", "votes": 1945, "symbol": "☀️"}
            ],
            "Kathmandu-3": [
                {"candidate": "Raju Nath Pandey", "party": "RSP", "votes": 18757, "symbol": "🔔"},
                {"candidate": "Kulman Ghising", "party": "Ujyaalo Nepal", "votes": 11171, "symbol": "💡"},
                {"candidate": "Santosh Chalise", "party": "NC", "votes": 5230, "symbol": "🌳"}
            ]
        };

        // 2. Party Color Mapping
        const getPartyColor = (party) => {
            const colors = {
                "RSP": "var(--color-rsp)",
                "CPN-UML": "var(--color-uml)",
                "NC": "var(--color-nc)",
                "Ujyaalo Nepal": "var(--color-ujyaalo)"
            };
            return colors[party] || "var(--color-other)";
        };

        // 3. DOM Elements
        const regionSelect = document.getElementById('region-select');
        const resultsDisplay = document.getElementById('results-display');

        // 4. Render Logic
        const renderResults = (regionCode) => {
            const candidates = electionData[regionCode];
            
            // Calculate max votes in the region to scale the bar chart appropriately
            const maxVotes = Math.max(...candidates.map(c => c.votes));

            // Clear previous results
            resultsDisplay.innerHTML = '';

            // Generate UI for each candidate
            candidates.forEach((data, index) => {
                const fillPercentage = (data.votes / maxVotes) * 100;
                const partyColor = getPartyColor(data.party);
                
                // Check if this is RSP to apply the special bell class
                const isRSP = data.party === "RSP";
                const symbolClass = isRSP ? "symbol rsp-bell" : "symbol";

                const candidateHTML = `
                    <div class="candidate-row">
                        <div class="candidate-info">
                            <div class="name-party">
                                <span class="${symbolClass}">${data.symbol}</span>
                                <span>${data.candidate} <span style="color: var(--text-muted); font-size: 0.8rem; font-weight: 400;">(${data.party})</span></span>
                            </div>
                            <div class="votes">${data.votes.toLocaleString()}</div>
                        </div>
                        <div class="bar-container">
                            <div class="bar-fill" style="width: 0%; background-color: ${partyColor}"></div>
                        </div>
                    </div>
                `;
                
                resultsDisplay.insertAdjacentHTML('beforeend', candidateHTML);

                // Trigger CSS width transition shortly after render for smooth animation
                setTimeout(() => {
                    const bars = resultsDisplay.querySelectorAll('.bar-fill');
                    bars[index].style.width = `${fillPercentage}%`;
                }, 50);
            });
        };

        // 5. Event Listeners & Initialization
        regionSelect.addEventListener('change', (e) => {
            renderResults(e.target.value);
        });

        // Initial render
        renderResults(regionSelect.value);

    </script>
</body>
</html>
