<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Election 2026 - Live Result Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --accent: #3b82f6; /* Balen/RSP Blue */
        --text: #f8fafc;
        --success: #22c55e;
        --danger: #ef4444;
    }

    /* Core Layout */
    body { 
        font-family: 'Inter', sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        padding: 10px; 
    }
    
    .container { 
        max-width: 1000px; 
        margin: 20px auto; 
        background: var(--card); 
        border-radius: 12px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        overflow: hidden;
    }

    /* Timeline Styling */
    .timeline-box {
        margin: 15px;
        padding: 15px 20px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
    }

    .timeline-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        align-items: center;
    }

    .timeline-header label {
        font-size: 0.7rem;
        letter-spacing: 1px;
        color: #64748b;
        font-weight: 800;
        text-transform: uppercase;
    }

    #slider-time {
        font-size: 0.85rem;
        color: var(--accent);
        font-family: 'Courier New', monospace;
    }

    .timeline-controls {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    #play-btn {
        background: var(--success);
        border: none;
        padding: 8px 18px;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        min-width: 90px;
    }

    #play-btn:hover { transform: scale(1.05); }

    /* Custom Slider */
    #timeline-slider {
        flex-grow: 1;
        cursor: pointer;
        accent-color: var(--accent);
        height: 6px;
    }

    /* Chart Transition */
    .chart-section {
        padding: 20px;
        height: 400px;
        transition: opacity 0.3s ease;
    }

    /* Standard Elements from previous steps */
    .tab { padding: 15px 20px; cursor: pointer; color: #94a3b8; }
    .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
    .region-btn { background: #334155; border: none; color: white; margin: 2px; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    .region-btn.selected { background: var(--accent); }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 1.6rem;">🗳️ Nepal Election 2026</h1>
            <div class="live-pulse"><span class="pulse-dot"></span> LIVE DATA FEED</div>
        </div>
        <div style="text-align:right">
            <div id="update-time" style="font-size: 1rem; font-weight: bold; color: var(--accent);">--:--</div>
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: 600;">LAST UPDATED</div>
        </div>
    </div>

    <div class="tabs-container" id="province-tabs"></div>

    <div class="grid-container" id="constituency-grid"></div>

    <div class="chart-section">
        <canvas id="mainChart"></canvas>
    </div>
    <div class="timeline-box">
    <div class="timeline-header">
        <label>HISTORICAL TIMELINE</label>
        <span id="slider-time">Live Feed</span>
    </div>
    <div class="timeline-controls">
        <button onclick="togglePlay()" id="play-btn">PLAY ▶</button>
        <input type="range" id="timeline-slider" min="0" max="0" value="0" oninput="viewHistory(this.value)">
    </div>
</div>

    <div class="footer-meta">
        <span>&copy; 2026 Live Election Tracker</span>
        <span>Source: Election Commission of Nepal (ECN)</span>
    </div>
</div>

<script>
    // --- Data Definition ---
    const provinces = {
        "Koshi": ["Taplejung 1", "Panchthar 1", "Ilam 1", "Ilam 2", "Jhapa 1", "Jhapa 2", "Jhapa 3", "Jhapa 4", "Jhapa 5", "Sankhuwasabha 1", "Bhojpur 1", "Dhankuta 1", "Tehrathum 1", "Sunsari 1", "Sunsari 2", "Sunsari 3", "Sunsari 4", "Morang 1", "Morang 2", "Morang 3", "Morang 4", "Morang 5", "Morang 6"],
        "Madhesh": ["Saptari 1", "Saptari 2", "Siraha 1", "Siraha 2", "Dhanusha 1", "Dhanusha 3", "Mahottari 1", "Sarlahi 1", "Rautahat 1", "Bara 1", "Parsa 1"],
        "Bagmati": ["Kathmandu 1", "Kathmandu 2", "Kathmandu 3", "Kathmandu 4", "Kathmandu 5", "Kathmandu 6", "Kathmandu 7", "Kathmandu 8", "Kathmandu 9", "Kathmandu 10", "Chitwan 1", "Chitwan 2", "Chitwan 3", "Bhaktapur 1", "Lalitpur 1", "Makwanpur 1", "Nuwakot 1", "Dhading 1"],
        "Gandaki": ["Kaski 1", "Kaski 2", "Kaski 3", "Tanahu 1", "Tanahu 2", "Gorkha 1", "Gorkha 2", "Syangja 1", "Lamjung 1", "Parbat 1"],
        "Lumbini": ["Rupandehi 1", "Rupandehi 2", "Rupandehi 3", "Dang 1", "Dang 2", "Banke 1", "Banke 2", "Kapilvastu 1", "Gulmi 1", "Palpa 1"],
        "Karnali": ["Surkhet 1", "Surkhet 2", "Dailekh 1", "Jumla 1", "Salyan 1", "Kalikot 1"],
        "Sudurpashchim": ["Kailali 1", "Kailali 2", "Kailali 5", "Kanchanpur 1", "Kanchanpur 2", "Dadeldhura 1", "Doti 1", "Baitadi 1"]
    };

    let currentProvince = "Koshi";
    let currentRegion = "Jhapa 5";
    let chart = null;

    // --- UI Logic ---
    function initUI() {
        const tabWrapper = document.getElementById('province-tabs');
        tabWrapper.innerHTML = '';
        
        Object.keys(provinces).forEach(prov => {
            const div = document.createElement('div');
            div.className = `tab ${prov === currentProvince ? 'active' : ''}`;
            div.innerText = prov;
            div.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                div.classList.add('active');
                renderGrid(prov);
            };
            tabWrapper.appendChild(div);
        });
        renderGrid(currentProvince);
    }

    function renderGrid(prov) {
        currentProvince = prov;
        const grid = document.getElementById('constituency-grid');
        grid.innerHTML = '';
        
        provinces[prov].forEach(reg => {
            const btn = document.createElement('button');
            btn.className = `region-btn ${reg === currentRegion ? 'selected' : ''}`;
            btn.innerText = reg;
            btn.onclick = () => {
                document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                currentRegion = reg;
                fetchData();
            };
            grid.appendChild(btn);
        });

        // Auto-fetch the first one when switching provinces
        if (!provinces[prov].includes(currentRegion)) {
            currentRegion = provinces[prov][0];
            const firstBtn = grid.querySelector('.region-btn');
            if(firstBtn) firstBtn.classList.add('selected');
        }
        fetchData();
    }

    // --- Data Engine ---
    async function fetchData() {
        try {
            // Fetching from your relative path election_data.json
            const response = await fetch('./election_data.json');
            if (!response.ok) throw new Error("JSON file unavailable");
            
            const json = await response.json();
            
            // Update timestamp
            document.getElementById('update-time').innerText = json.last_updated;
            
            // Normalize keys: convert "Jhapa 5" (UI) to "Jhapa-5" (JSON Key)
            const keyWithDash = currentRegion.replace(/\s+/g, '-');
            const regionData = json.data[keyWithDash] || json.data[currentRegion] || [];

            renderChart(regionData, currentRegion);
        } catch (error) {
            console.error("Data error:", error);
            // Render empty chart on error to keep UI stable
            renderChart([], "Waiting for Data...");
        }
    }

    function renderChart(data, regionName) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        // Handle case with no data
        const labels = data.length > 0 ? data.map(c => `${c.name} (${c.party})`) : ["No Results Yet"];
        const votes = data.length > 0 ? data.map(c => c.votes) : [0];
        const colors = data.length > 0 ? data.map(c => c.color) : ["#334155"];

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Votes',
                    data: votes,
                    backgroundColor: colors,
                    borderRadius: 6,
                    barThickness: 35
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: true }
                },
                scales: {
                    x: { 
                        grid: { color: '#334155' }, 
                        ticks: { color: '#94a3b8' },
                        beginAtZero: true
                    },
                    y: { 
                        grid: { display: false },
                        ticks: { 
                            color: 'white', 
                            font: { weight: 'bold', size: 12 } 
                        }
                    }
                }
            }
        });
    }

    // Start App
    window.onload = initUI;
</script>

</body>
</html>
