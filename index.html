<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal 2026 Election Tracker - Tabbed View</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: 20px auto; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Header & Live Pulse */
        .header { padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .live-pulse { color: #ef4444; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .pulse-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Tabs Styling */
        .tabs-container { display: flex; background: #111827; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab { padding: 15px 20px; cursor: pointer; border-bottom: 3px solid transparent; color: #94a3b8; font-weight: 600; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: #1e293b; }

        /* Grid View for Constituencies */
        .grid-container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-height: 200px; overflow-y: auto; background: #111827; margin: 10px 20px; border-radius: 8px; }
        .region-btn { background: #334155; border: 1px solid #475569; color: white; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .region-btn:hover { background: var(--accent); }
        .region-btn.selected { background: var(--accent); border-color: white; }

        /* Chart Area */
        .chart-section { padding: 20px; height: 350px; }
        .meta-text { padding: 0 20px 20px; font-size: 0.8rem; color: #64748b; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 1.4rem;">Election 2026 Results</h1>
            <div class="live-pulse"><span class="pulse-dot"></span> LIVE DATA FEED</div>
        </div>
        <div style="text-align:right">
            <div id="update-time" style="font-size: 0.9rem; font-weight: bold;">--:--</div>
            <div style="font-size: 0.7rem; color: #94a3b8;">LAST UPDATED</div>
        </div>
    </div>

    <div class="tabs-container" id="province-tabs">
        </div>

    <div class="grid-container" id="constituency-grid">
        </div>

    <div class="chart-section">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="meta-text" id="status-bar">
        Source: ECN Official & Media Partners | Syncing every 5 minutes
    </div>
</div>
