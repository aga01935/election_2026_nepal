<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Election 2026 - Live Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
        }

        .container { 
            max-width: 1100px; 
            margin: 10px auto; 
            background: var(--card); 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            overflow: hidden;
        }

        /* Top Header with Blinking Pulse */
        .live-header {
            background: #111827;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--danger);
            color: var(--danger);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Horizontal Province Tabs */
        .province-tabs {
            display: flex;
            background: #1e293b;
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 10px;
            scrollbar-width: none; /* Firefox */
        }
        .province-tabs::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        /* Constituency Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            padding: 20px;
            background: #0f172a;
            max-height: 200px;
            overflow-y: auto;
        }

        .region-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .region-btn:hover { border-color: var(--accent); }
        .region-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

        .chart-section { padding: 25px; height: 400px; }

        .timeline-box {
            margin: 20px;
            padding: 15px;
            background: #111827;
            border-radius: 10px;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="live-header">
        <div>
            <h1 style="margin:0; font-size: 1.4rem;">Election Tracker 2026</h1>
            <div class="status-badge">
                <div class="pulse-dot"></div> LIVE ECN DATA FEED
            </div>
        </div>
        <div style="text-align:right">
            <div id="update-time" style="font-size: 0.9rem; font-weight: bold; color: var(--accent);">--:--</div>
            <div style="font-size: 0.7rem; color: #64748b;">UPDATED MOMENTS AGO</div>
        </div>
    </div>

    <div class="province-tabs" id="province-tabs"></div>

    <div class="grid-container" id="constituency-grid"></div>

    <div class="chart-section">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="timeline-box">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
            <label style="font-size:0.7rem; color:#64748b; font-weight:bold;">HISTORICAL PLAYBACK</label>
            <span id="slider-time" style="font-family:monospace; color:var(--accent);">Live View</span>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <button onclick="togglePlay()" id="play-btn" style="background:#22c55e; border:none; padding:8px 20px; border-radius:5px; color:white; cursor:pointer; font-weight:bold;">PLAY ▶</button>
            <input type="range" id="timeline-slider" min="0" max="0" value="0" style="flex-grow:1; accent-color:var(--accent);" oninput="viewHistory(this.value)">
        </div>
    </div>
</div>

<script>
    const provinces = {
    "Koshi": [
        "Taplejung-1", "Panchthar-1", "Ilam-1", "Ilam-2", "Jhapa-1", "Jhapa-2", "Jhapa-3", "Jhapa-4", "Jhapa-5", 
        "Sankhuwasabha-1", "Tehrathum-1", "Bhojpur-1", "Dhankuta-1", "Morang-1", "Morang-2", "Morang-3", "Morang-4", 
        "Morang-5", "Morang-6", "Sunsari-1", "Sunsari-2", "Sunsari-3", "Sunsari-4", "Solukhumbu-1", "Khotang-1", 
        "Okhaldhunga-1", "Udayapur-1", "Udayapur-2"
    ],
    "Madhesh": [
        "Saptari-1", "Saptari-2", "Saptari-3", "Saptari-4", "Siraha-1", "Siraha-2", "Siraha-3", "Siraha-4", 
        "Dhanusha-1", "Dhanusha-2", "Dhanusha-3", "Dhanusha-4", "Mahottari-1", "Mahottari-2", "Mahottari-3", "Mahottari-4", 
        "Sarlahi-1", "Sarlahi-2", "Sarlahi-3", "Sarlahi-4", "Rautahat-1", "Rautahat-2", "Rautahat-3", "Rautahat-4", 
        "Bara-1", "Bara-2", "Bara-3", "Bara-4", "Parsa-1", "Parsa-2", "Parsa-3", "Parsa-4"
    ],
    "Bagmati": [
        "Sindhuli-1", "Sindhuli-2", "Ramechhap-1", "Dolakha-1", "Sindhupalchok-1", "Sindhupalchok-2", 
        "Kavrepalanchok-1", "Kavrepalanchok-2", "Lalitpur-1", "Lalitpur-2", "Lalitpur-3", "Bhaktapur-1", "Bhaktapur-2", 
        "Kathmandu-1", "Kathmandu-2", "Kathmandu-3", "Kathmandu-4", "Kathmandu-5", "Kathmandu-6", "Kathmandu-7", 
        "Kathmandu-8", "Kathmandu-9", "Kathmandu-10", "Nuwakot-1", "Nuwakot-2", "Rasuwa-1", "Dhading-1", "Dhading-2", 
        "Makwanpur-1", "Makwanpur-2", "Chitwan-1", "Chitwan-2", "Chitwan-3"
    ],
    "Gandaki": [
        "Gorkha-1", "Gorkha-2", "Manang-1", "Lamjung-1", "Kaski-1", "Kaski-2", "Kaski-3", "Tanahun-1", "Tanahun-2", 
        "Syangja-1", "Syangja-2", "Nawalpur-1", "Nawalpur-2", "Mustang-1", "Myagdi-1", "Baglung-1", "Baglung-2", "Parbat-1"
    ],
    "Lumbini": [
        "Gulmi-1", "Gulmi-2", "Palpa-1", "Palpa-2", "Arghakhanchi-1", "Pyuthan-1", "Rolpa-1", "RukumEast-1", 
        "Dang-1", "Dang-2", "Dang-3", "Banke-1", "Banke-2", "Banke-3", "Bardiya-1", "Bardiya-2", "Parasi-1", "Parasi-2", 
        "Rupandehi-1", "Rupandehi-2", "Rupandehi-3", "Rupandehi-4", "Rupandehi-5", "Kapilvastu-1", "Kapilvastu-2", "Kapilvastu-3"
    ],
    "Karnali": [
        "Dolpa-1", "Mugu-1", "Humla-1", "Jumla-1", "Kalikot-1", "Mugu-1", "Dailekh-1", "Dailekh-2", "Surkhet-1", 
        "Surkhet-2", "Jajarkot-1", "Salyan-1", "RukumWest-1"
    ],
    "Sudurpashchim": [
        "Bajura-1", "Bajhang-1", "Doti-1", "Achham-1", "Achham-2", "Kailali-1", "Kailali-2", "Kailali-3", "Kailali-4", 
        "Kailali-5", "Kanchanpur-1", "Kanchanpur-2", "Kanchanpur-3", "Dadeldhura-1", "Baitadi-1", "Darchula-1"
    ]
};

    // Symbol Mapping Extension
    const partySymbols = {
        "RSP": "🔔",
        "CPN-UML": "☀️",
        "NC": "🌳",
        "CPN-MC": "☭",
        "Ujyaalo Nepal": "💡",
        "RPP": "🚩",
        "Independent": "👤"
    };

    let currentProvince = "Koshi";
    let currentRegion = "Jhapa-5";
    let chart;
    let electionHistory = [];
    let isPlaying = false;
    let playInterval;

    function initUI() {
        const tabWrapper = document.getElementById('province-tabs');
        Object.keys(provinces).forEach(prov => {
            const div = document.createElement('div');
            div.className = `tab ${prov === currentProvince ? 'active' : ''}`;
            div.innerText = prov;
            div.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                div.classList.add('active');
                renderGrid(prov);
            };
            tabWrapper.appendChild(div);
        });
        renderGrid(currentProvince);
    }

    function renderGrid(prov) {
        currentProvince = prov;
        const grid = document.getElementById('constituency-grid');
        grid.innerHTML = '';
        provinces[prov].forEach(reg => {
            const btn = document.createElement('button');
            btn.className = `region-btn ${reg === currentRegion ? 'selected' : ''}`;
            btn.innerText = reg;
            btn.onclick = () => {
                document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                currentRegion = reg;
                fetchData();
            };
            grid.appendChild(btn);
        });
        if (!provinces[prov].includes(currentRegion)) {
            currentRegion = provinces[prov][0];
            fetchData();
        }
    }

    async function fetchData() {
        try {
            const res = await fetch('./election_data.json');
            const json = await res.json();
            document.getElementById('update-time').innerText = json.last_updated;
            renderChart(json.data[currentRegion] || []);
        } catch (e) { console.error(e); }
    }

    async function loadHistory() {
        try {
            const res = await fetch('./election_history.json');
            electionHistory = await res.json();
            document.getElementById('timeline-slider').max = electionHistory.length - 1;
            document.getElementById('timeline-slider').value = electionHistory.length - 1;
        } catch (e) {}
    }

    function renderChart(data) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        // Labels mapped with party symbols
        const chartLabels = data.map(c => {
            const symbol = partySymbols[c.party] || "🗳️";
            return `${symbol} ${c.name} (${c.party})`;
        });

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: chartLabels,
                datasets: [{
                    data: data.map(c => c.votes),
                    backgroundColor: data.map(c => c.color),
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    y: { ticks: { color: 'white', font: { weight: 'bold' } } }
                }
            }
        });
    }

    function viewHistory(index) {
        const snap = electionHistory[index];
        document.getElementById('slider-time').innerText = snap.timestamp;
        renderChart(snap.snapshot[currentRegion] || []);
    }

    function togglePlay() {
        const btn = document.getElementById('play-btn');
        if (isPlaying) {
            clearInterval(playInterval);
            btn.innerText = "PLAY ▶";
            btn.style.background = "#22c55e";
        } else {
            btn.innerText = "STOP ◼";
            btn.style.background = "#ef4444";
            let i = 0;
            playInterval = setInterval(() => {
                document.getElementById('timeline-slider').value = i;
                viewHistory(i);
                i++;
                if (i >= electionHistory.length) togglePlay();
            }, 1000);
        }
        isPlaying = !isPlaying;
    }

    window.onload = async () => {
        initUI();
        await fetchData();
        await loadHistory();
    };
</script>
</body>
</html>
