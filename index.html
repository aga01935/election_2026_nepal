<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nepal Election 2026 - Live Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; }
        .badge { background: #ef4444; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        select { width: 100%; padding: 10px; margin: 20px 0; border-radius: 6px; }
        .meta { color: #94a3b8; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="badge">LIVE</span> Nepal Election Tracker 2026</h1>
        <p class="meta">Last Scraped: <span id="time-stamp">--</span></p>
        
        <select id="constituency-select" onchange="updateChart()">
            <option value="Jhapa-5">Jhapa-5</option>
            <option value="Kathmandu-3">Kathmandu-3</option>
        </select>

        <canvas id="electionChart" height="200"></canvas>
    </div>

    <script>
        let chartInstance = null;
        let globalData = {};

        async function init() {
            const res = await fetch('./election_data.json');
            const json = await res.json();
            globalData = json.data;
            document.getElementById('time-stamp').innerText = json.last_updated;
            updateChart();
        }

        function updateChart() {
            const val = document.getElementById('constituency-select').value;
            const candidates = globalData[val] || [];
            
            const ctx = document.getElementById('electionChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: candidates.map(c => c.name),
                    datasets: [{
                        data: candidates.map(c => c.votes),
                        backgroundColor: candidates.map(c => c.color)
                    }]
                },
                options: {
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { color: '#334155' } }, y: { ticks: { color: 'white' } } }
                }
            });
        }

        init();
    </script>
</body>
</html>
